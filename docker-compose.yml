version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: aegis-qr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aegis_qr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - aegis_qr_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aegis_qr"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aegis_qr_postgres_data:

