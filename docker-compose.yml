version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: qrguard-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qrguard_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - qrguard_ai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qrguard_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  qrguard_ai_postgres_data:

